RESULT PAGE <div class="logos"><img src="{{url_for('static', filename='image/user.png')}}" class="img" />

<style>
@import url('https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap');
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }
  html,body{
    display: grid;
    height: 100%;
    width: 100%;
    place-items: center;
    background: #f2f2f2;
    /* background: linear-gradient(-135deg, #c850c0, #4158d0); */
  }
  .img{
    height:52px;
    width:52px;
    clip-path:circle();
  }
  .logos
  {
    position: absolute;
    top: 17px;
    right: 250px;
    
  }
  ::selection{
    background: #4158d0;
    color: #fff;
  }
  .wrapper{
    text-align: center;
    font-size: 28px;
    width: 1366px;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0px 15px 20px rgba(0,0,0,0.1);
  }
  .wrapper .title{
    font-size: 25px;
    font-weight: 600;
    text-align: center;
    line-height: 70px;
    color: #fff;
    user-select: none;
    border-radius: 15px 15px 0 0;
    background:rebeccapurple;
  }
  
  .img{
    height:52px;
    width:52px;
    clip-path:circle();
  }
  .logos
  {
    position: absolute;
    top: 17px;
    right: 250px;
  }
  .users
  {
    width: 1280px;
    height: 55px;
    text-align:right;
  }

  .wrapper form{
    padding: 230px 50px 180px 50px;
  }
  .field
  {
    margin-top: 13px;
    text-align: center;
  }
  .c1
  {
    font-weight: 100;
    font-size: 20px;
    border-radius: 20px;
    border: 1px solid rebeccapurple;
    background: rebeccapurple;
    cursor: pointer;
    color: white;
    padding: 23px 75px 20px 75px;
  }

</style>
</div><br>
<br>
<br>
<br>
{{msg}}
<input type="hidden" id="s" value={{msg}} />
{% block javascript %}
<script>
    const y= '{{ msg }}'
    console.log(y,"ll")
    var msg = new SpeechSynthesisUtterance(y);
var voices = window.speechSynthesis.getVoices();
msg.voice = voices[4]; 
msg.volume = 1; // From 0 to 1
msg.rate = 0.6; // From 0.1 to 10
msg.pitch = 6
window.speechSynthesis.speak(msg);
</script>
{% endblock %}
<br>
<br>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="{{url_for('static',filename='jquery.jkey.js')}}"></script>
<script>

  $(document).jkey('q',function(){
    window.location = window.location.origin+"/logout";

  });

$(document).jkey('w',function(){
    window.location = window.location.origin+"/results";

  });

  $(document).jkey('e',function(){
    window.location = window.location.origin+"/index";

  });
  </script>

<div class="field">
  <a href="{{url_for('logout')}}" ><button class="c1">LOGOUT</button> </a>
</div>

</div> 
</body>
</html>
